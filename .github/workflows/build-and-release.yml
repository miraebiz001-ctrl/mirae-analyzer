name: Build & Release Windows EXE

"on":
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Windows EXE
        run: npx electron-builder --win --x64 --publish never

      - name: Create Self-Signed Certificate and Sign EXE
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=MiraeBizon, O=MiraeBizon Inc" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(3)
          $exe = Get-ChildItem dist\*.exe | Select-Object -First 1
          Set-AuthenticodeSignature -FilePath $exe.FullName -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
          Write-Host "Signed: $($exe.Name)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiraeBizon-AI-Setup
          path: dist/*.exe
