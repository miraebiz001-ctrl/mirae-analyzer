<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:560px;height:520px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  font-family:'Noto Sans KR',sans-serif;
  -webkit-app-region:drag;user-select:none;
}
.card{
  width:520px;
  background:#ffffff;
  border-radius:28px;
  box-shadow:0 25px 80px rgba(0,0,0,0.12),0 8px 32px rgba(3,199,90,0.08),0 0 0 1px rgba(0,0,0,0.04);
  overflow:hidden;position:relative;
  animation:fadeUp 0.4s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';display:block;height:4px;background:linear-gradient(90deg,#03C75A 0%,#00E676 40%,#03C75A 100%)}
.card-inner{padding:36px 40px 32px}
.logo-area{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.logo-icon{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(145deg,#03C75A,#00A348);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 8px 24px rgba(3,199,90,0.25),inset 0 1px 1px rgba(255,255,255,0.3);
  position:relative;
}
.logo-icon::after{content:'';position:absolute;inset:2px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.2) 0%,transparent 50%);pointer-events:none}
.logo-title{font-size:18px;font-weight:900;color:#1a1a1a;letter-spacing:-0.3px;line-height:1.2}
.logo-sub{font-size:12px;font-weight:500;color:#868e96;margin-top:2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,#e9ecef,transparent);margin-bottom:28px}
.section-label{font-size:11px;font-weight:700;color:#03C75A;letter-spacing:1.5px;margin-bottom:14px}
.input-wrap{position:relative;margin-bottom:20px}
.input-wrap input{
  width:100%;padding:16px 20px;
  border:2px solid #e9ecef;border-radius:12px;
  font-size:20px;font-weight:700;text-align:center;letter-spacing:5px;text-transform:uppercase;
  outline:none;font-family:'Noto Sans KR',monospace;color:#1a1a1a;background:#fafbfc;
  -webkit-app-region:no-drag;transition:all 0.25s ease;
}
.input-wrap input:focus{border-color:#03C75A;background:#fff;box-shadow:0 0 0 4px rgba(3,199,90,0.1),0 4px 12px rgba(3,199,90,0.08)}
.input-wrap input::placeholder{font-size:15px;letter-spacing:2px;color:#ced4da;font-weight:500}
.btn-primary{
  width:100%;padding:15px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#03C75A,#00A348);
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  -webkit-app-region:no-drag;transition:all 0.2s ease;
  box-shadow:0 4px 16px rgba(3,199,90,0.3),0 1px 2px rgba(0,0,0,0.1);
  position:relative;overflow:hidden;
}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 50%);pointer-events:none}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(3,199,90,0.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-exit{
  width:100%;padding:13px;border:1.5px solid #e9ecef;border-radius:12px;
  background:#fff;color:#868e96;font-size:13.5px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;-webkit-app-region:no-drag;
  margin-top:8px;transition:all 0.15s;
}
.btn-exit:hover{background:#f8f9fa;border-color:#dee2e6;color:#495057}
.msg{text-align:center;font-size:13px;margin-top:16px;min-height:22px;line-height:1.5;font-weight:500;transition:all 0.2s}
.msg.error{color:#e03131}.msg.success{color:#03C75A}.msg.loading{color:#868e96}
.contact{margin-top:24px;padding-top:20px;border-top:1px solid #f1f3f5;text-align:center}
.contact-label{font-size:11px;font-weight:600;color:#adb5bd;margin-bottom:12px}
.contact-btns{display:flex;gap:8px;justify-content:center}
.contact-btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;
  font-size:12px;font-weight:700;text-decoration:none;-webkit-app-region:no-drag;
  cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;
}
.contact-kakao{background:#FEE500;color:#3C1E1E}
.contact-kakao:hover{background:#FDD800;transform:translateY(-1px)}
.contact-tel{background:#f1f3f5;color:#495057}
.contact-tel:hover{background:#e9ecef;transform:translateY(-1px)}
.machine-id{font-size:9.5px;color:#dee2e6;text-align:center;margin-top:14px;font-family:'Consolas','D2Coding',monospace;letter-spacing:0.5px}
.btn-loading{pointer-events:none}
.btn-loading .btn-text{opacity:0}
.btn-loading::after{
  content:'';position:absolute;width:22px;height:22px;
  border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;
  left:50%;top:50%;margin:-11px 0 0 -11px;animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.success-icon{
  display:none;width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#03C75A,#00E676);
  margin:0 auto 16px;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 8px 24px rgba(3,199,90,0.3);color:#fff;
  animation:popIn 0.3s ease-out;
}
.success-icon.show{display:flex}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="card">
  <div class="card-inner">
    <div class="logo-area">
      <div class="logo-icon">🔍</div>
      <div>
        <div class="logo-title">미래비즈온 AI분석툴</div>
        <div class="logo-sub">타지역서비스 심층 분석 시스템</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="success-icon" id="successIcon">✓</div>
    <div id="inputSection">
      <div class="section-label">LICENSE KEY</div>
      <div class="input-wrap">
        <input type="text" id="keyInput" placeholder="BETA-XXXX-XXXX" maxlength="14" autocomplete="off" spellcheck="false">
      </div>
      <button class="btn-primary" id="activateBtn" onclick="activate()"><span class="btn-text">인증하기</span></button>
      <button class="btn-exit" onclick="window.close()">종료</button>
    </div>
    <div class="msg" id="msg"></div>
    <div class="contact">
      <div class="contact-label">라이선스 키가 없으시면 문의해주세요</div>
      <div class="contact-btns">
        <a href="https://pf.kakao.com/_xgsLbn/chat" class="contact-btn contact-kakao" target="_blank">💬 카카오톡 상담</a>
        <a href="tel:1600-0251" class="contact-btn contact-tel">📞 1600-0251</a>
      </div>
    </div>
    <div class="machine-id" id="mid"></div>
  </div>
</div>
<script>
window.electronAPI.getMachineId().then(function(id){document.getElementById('mid').textContent='DEVICE \u00B7 '+id.substring(0,8).toUpperCase()});
var keyInput=document.getElementById('keyInput');
keyInput.addEventListener('input',function(e){var v=e.target.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();if(v.length>4)v=v.substring(0,4)+'-'+v.substring(4);if(v.length>9)v=v.substring(0,9)+'-'+v.substring(9);e.target.value=v.substring(0,14)});
keyInput.addEventListener('keydown',function(e){if(e.key==='Enter')activate()});
setTimeout(function(){keyInput.focus()},500);
async function activate(){var key=keyInput.value.trim();var msg=document.getElementById('msg');var btn=document.getElementById('activateBtn');if(!key||key.length<10){msg.className='msg error';msg.textContent='\uC62C\uBC14\uB978 \uB77C\uC774\uC120\uC2A4 \uD0A4\uB97C \uC785\uB825\uD574\uC8FC\uC138\uC694';keyInput.style.borderColor='#e03131';keyInput.style.boxShadow='0 0 0 4px rgba(224,49,49,0.1)';setTimeout(function(){keyInput.style.borderColor='#e9ecef';keyInput.style.boxShadow='none'},2000);return}btn.classList.add('btn-loading');btn.disabled=true;msg.className='msg loading';msg.textContent='\uC11C\uBC84 \uC778\uC99D \uD655\uC778 \uC911...';try{var result=await window.electronAPI.activateLicense(key);if(result.success){msg.className='msg success';msg.textContent=result.message||'\uC778\uC99D \uC644\uB8CC!';document.getElementById('inputSection').style.display='none';var si=document.getElementById('successIcon');si.classList.add('show');setTimeout(function(){window.electronAPI.launchApp()},1800)}else{msg.className='msg error';msg.textContent=result.message||'\uC778\uC99D\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4';btn.classList.remove('btn-loading');btn.disabled=false}}catch(e){msg.className='msg error';msg.textContent='\uC11C\uBC84 \uC5F0\uACB0\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4. \uC778\uD130\uB137 \uC5F0\uACB0\uC744 \uD655\uC778\uD558\uC138\uC694.';btn.classList.remove('btn-loading');btn.disabled=false}}
</script>
</body>
</html>
